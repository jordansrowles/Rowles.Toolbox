name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    if: |
      github.event_name == 'pull_request' ||
      startsWith(github.event.head_commit.message, '[build]') ||
      startsWith(github.event.head_commit.message, '[deploy]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci
        working-directory: Rowles.Toolbox

      - name: Restore .NET dependencies
        run: dotnet restore Rowles.Toolbox/Rowles.Toolbox.csproj

      - name: Build
        run: dotnet build Rowles.Toolbox/Rowles.Toolbox.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish Rowles.Toolbox/Rowles.Toolbox.csproj -c Release -o output --no-build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm-output
          path: output/wwwroot
